services:
  dashboard:
    build: .
    container_name: listmonk-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./schedule.json:/app/schedule.json
      - ./unsubscribe_log.json:/app/unsubscribe_log.json
      - ./unsubscribe_settings.json:/app/unsubscribe_settings.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/auth/login')"]
      interval: 30s
      timeout: 5s
      retries: 3
