<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ListMonk Pro</title>
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-card: #1e2130;
            --border-color: #2a2e3f;
            --text-primary: #e4e6ef;
            --text-secondary: #8b8fa3;
            --text-muted: #5a5e72;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .logo {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .logo span { color: var(--accent); }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--accent-hover); }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .credit {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .credit a { color: var(--accent); text-decoration: none; }
        .credit a:hover { text-decoration: underline; }

        /* Light theme */
        [data-theme="light"] {
            --bg-primary: #f5f6fa;
            --bg-card: #ffffff;
            --border-color: #e2e4ea;
            --text-primary: #1a1d27;
            --text-secondary: #5a5e72;
            --text-muted: #8b8fa3;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --danger: #dc2626;
        }
        [data-theme="light"] .login-card { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    </style>
    <script>
        // Respect saved theme preference
        (function() {
            var t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
    <div class="login-card">
        <div class="logo">ListMonk<span>Pro</span></div>
        <div class="subtitle">Sign in to your dashboard</div>

        <div class="error" id="error">Invalid username or password</div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="credit">
            Developed by <a href="https://worthmind.net/" target="_blank" rel="noopener">WorthMind</a>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';

            try {
                const resp = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const data = await resp.json();
                    errorEl.textContent = data.detail || 'Invalid credentials';
                    errorEl.style.display = 'block';
                }
            } catch {
                errorEl.textContent = 'Connection error';
                errorEl.style.display = 'block';
            }
            return false;
        }
    </script>
</body>
</html>
