name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/Listmonk-Dashboard
            git pull origin main
            docker compose up -d --build
            sleep 5
            curl -f http://localhost:8000/auth/login || (echo "Deploy failed!" && exit 1)
